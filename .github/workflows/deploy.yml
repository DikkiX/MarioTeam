name: Deploy Naar Testserver (SFTP)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-testserver
  cancel-in-progress: true

jobs:
  deploy:
    name: Bestanden Uploaden
    runs-on: ubuntu-latest

    steps:
      - name: Repository Ophalen
        uses: actions/checkout@v4

      - name: Lftp Installeren
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20 -o Acquire::ForceIPv4=true install -y lftp

      - name: Bestanden Via SFTP Uploaden
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Deze map op de server bevat nu de site.
          DOELMAP="/customers/9/f/d/c84yb4zgy/webroots/10777826/"

          # mirror -R zet lokale bestanden naar de server.
          # --delete haalt oude repo-bestanden op de server weg.
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "sftp://$FTP_SERVER:22" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          mirror -R --delete --verbose \
            --exclude-glob .git \
            --exclude-glob .github \
            --exclude-glob .gitignore \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob .DS_Store \
            --exclude-glob docs \
            --exclude-glob Oud \
            --exclude-glob node_modules \
            --exclude-glob vendor \
            --exclude-glob storage/google \
            --exclude-glob storage/google/* \
            ./ "$DOELMAP"
          bye
          EOF
